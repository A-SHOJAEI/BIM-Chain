version: "3.8"

volumes:
  orderer1.bimchain.com:
  orderer2.bimchain.com:
  orderer3.bimchain.com:
  orderer4.bimchain.com:
  orderer5.bimchain.com:
  peer0.architect.bimchain.com:
  peer1.architect.bimchain.com:
  peer0.engineer.bimchain.com:
  peer1.engineer.bimchain.com:
  couchdb.peer0.architect:
  couchdb.peer1.architect:
  couchdb.peer0.engineer:
  couchdb.peer1.engineer:

networks:
  bimchain:
    name: bimchain_network
    driver: bridge

services:
  # ---------------------------------------------------------------------------
  # Certificate Authorities
  # ---------------------------------------------------------------------------
  ca.architect.bimchain.com:
    image: hyperledger/fabric-ca:1.5
    container_name: ca.architect.bimchain.com
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-architect
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=7054
    ports:
      - "7054:7054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ../crypto-config/fabric-ca/architect:/etc/hyperledger/fabric-ca-server
    networks:
      - bimchain

  ca.engineer.bimchain.com:
    image: hyperledger/fabric-ca:1.5
    container_name: ca.engineer.bimchain.com
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-engineer
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=8054
    ports:
      - "8054:8054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ../crypto-config/fabric-ca/engineer:/etc/hyperledger/fabric-ca-server
    networks:
      - bimchain

  # ---------------------------------------------------------------------------
  # Orderer Nodes (Raft Consensus)
  # ---------------------------------------------------------------------------
  orderer1.bimchain.com:
    image: hyperledger/fabric-orderer:2.5
    container_name: orderer1.bimchain.com
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=none
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
    working_dir: /root
    command: orderer
    ports:
      - "7050:7050"
      - "7053:7053"
    volumes:
      - ../crypto-config/ordererOrganizations/bimchain.com/orderers/orderer1.bimchain.com/msp:/var/hyperledger/orderer/msp
      - ../crypto-config/ordererOrganizations/bimchain.com/orderers/orderer1.bimchain.com/tls:/var/hyperledger/orderer/tls
      - orderer1.bimchain.com:/var/hyperledger/production/orderer
    networks:
      - bimchain

  orderer2.bimchain.com:
    image: hyperledger/fabric-orderer:2.5
    container_name: orderer2.bimchain.com
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=none
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
    working_dir: /root
    command: orderer
    ports:
      - "8050:7050"
      - "8053:7053"
    volumes:
      - ../crypto-config/ordererOrganizations/bimchain.com/orderers/orderer2.bimchain.com/msp:/var/hyperledger/orderer/msp
      - ../crypto-config/ordererOrganizations/bimchain.com/orderers/orderer2.bimchain.com/tls:/var/hyperledger/orderer/tls
      - orderer2.bimchain.com:/var/hyperledger/production/orderer
