      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
    working_dir: /root
    command: orderer
    ports:
      - "11050:7050"
      - "11053:7053"
    volumes:
      - ../crypto-config/ordererOrganizations/bimchain.com/orderers/orderer5.bimchain.com/msp:/var/hyperledger/orderer/msp
      - ../crypto-config/ordererOrganizations/bimchain.com/orderers/orderer5.bimchain.com/tls:/var/hyperledger/orderer/tls
      - orderer5.bimchain.com:/var/hyperledger/production/orderer
    networks:
      - bimchain

  # ---------------------------------------------------------------------------
  # CouchDB State Databases
  # ---------------------------------------------------------------------------
  couchdb.peer0.architect:
    image: couchdb:3.3
    container_name: couchdb.peer0.architect
    environment:
      - COUCHDB_USER=bimadmin
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD:-changeme}
    ports:
      - "5984:5984"
    volumes:
      - couchdb.peer0.architect:/opt/couchdb/data
    networks:
      - bimchain

  couchdb.peer1.architect:
    image: couchdb:3.3
    container_name: couchdb.peer1.architect
    environment:
      - COUCHDB_USER=bimadmin
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD:-changeme}
    ports:
      - "12984:5984"
    volumes:
      - couchdb.peer1.architect:/opt/couchdb/data
    networks:
      - bimchain

  couchdb.peer0.engineer:
    image: couchdb:3.3
    container_name: couchdb.peer0.engineer
    environment:
      - COUCHDB_USER=bimadmin
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD:-changeme}
    ports:
      - "7984:5984"
    volumes:
      - couchdb.peer0.engineer:/opt/couchdb/data
    networks:
      - bimchain

  couchdb.peer1.engineer:
    image: couchdb:3.3
    container_name: couchdb.peer1.engineer
    environment:
      - COUCHDB_USER=bimadmin
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD:-changeme}
    ports:
      - "8984:5984"
    volumes:
      - couchdb.peer1.engineer:/opt/couchdb/data
    networks:
      - bimchain

  # ---------------------------------------------------------------------------
  # Peer Nodes - ArchitectOrg
  # ---------------------------------------------------------------------------
  peer0.architect.bimchain.com:
    image: hyperledger/fabric-peer:2.5
    container_name: peer0.architect.bimchain.com
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_VM_ENDPOINT=unix:///var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=bimchain_network
      - CORE_PEER_ID=peer0.architect.bimchain.com
      - CORE_PEER_ADDRESS=peer0.architect.bimchain.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.architect.bimchain.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer1.architect.bimchain.com:8051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.architect.bimchain.com:7051
      - CORE_PEER_LOCALMSPID=ArchitectOrgMSP
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb.peer0.architect:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=bimadmin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=${COUCHDB_PASSWORD:-changeme}
      - CORE_METRICS_PROVIDER=prometheus
    working_dir: /etc/hyperledger/fabric/peer
    command: peer node start
    ports:
      - "7051:7051"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../crypto-config/peerOrganizations/architect.bimchain.com/peers/peer0.architect.bimchain.com/msp:/etc/hyperledger/fabric/msp
      - ../crypto-config/peerOrganizations/architect.bimchain.com/peers/peer0.architect.bimchain.com/tls:/etc/hyperledger/fabric/tls
      - peer0.architect.bimchain.com:/var/hyperledger/production
