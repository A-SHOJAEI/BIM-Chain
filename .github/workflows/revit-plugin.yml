name: Revit Plugin CI

on:
  push:
    paths:
      - "packages/revit-plugin/**"
  pull_request:
    paths:
      - "packages/revit-plugin/**"

jobs:
  build-and-test:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: packages/revit-plugin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build

      - name: Test
        run: dotnet test
