name: Middleware CI

on:
  push:
    paths:
      - "packages/middleware/**"
  pull_request:
    paths:
      - "packages/middleware/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/middleware

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/middleware/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx tsc --noEmit

      - name: Test with coverage
        run: npm test -- --coverage
