name: Chaincode CI

on:
  push:
    paths:
      - "packages/chaincode-go/**"
  pull_request:
    paths:
      - "packages/chaincode-go/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/chaincode-go

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ">=1.21"
          cache-dependency-path: packages/chaincode-go/go.sum

      - name: Vet
        run: go vet ./...

      - name: Test with coverage
        run: go test -v -coverprofile=coverage.out ./...

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: chaincode-coverage
          path: packages/chaincode-go/coverage.out
